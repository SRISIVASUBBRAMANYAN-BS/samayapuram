<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">

    <title>அருள்மிகு சமயபுரம் மாரியம்மன் பூச்சொரிதல் விழா 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>

    <style>

        .amman-loading-img {

        /* Scanner Section */

        }

        .video-container {

        /* Footer */
        .footer {

        /* Success Checkmark */
        .success-checkmark {

        @keyframes popIn {

        /* Responsive */
        @media (max-width: 480px) {

            .logs-table th,
            .logs-table td {

        .no-data {

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <img src="1.jpeg" alt="Amman" class="amman-loading-img">

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="1.jpeg" alt="Logo" class="header-logo">
            <div class="header-text">
                <h1>சமயபுரம் மாரியம்மன் பூச்சொரிதல் விழா</h1>
                <div class="header-date" id="headerDate"></div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content" id="mainContent">
            <!-- Dashboard -->
            <div class="dashboard" id="dashboard">
                <div class="btn-group">
                    <button class="btn btn-scan" onclick="startScanning()">ஸ்கேன் செய்���வும்</button>
                    <button class="btn btn-logs" onclick="showPasswordModal()">தகவல்கள்</button>
                </div>
            </div>

            <!-- Scanner Section -->
            <div class="scanner-section hidden" id="scannerSection">

            <div class="logs-section hidden" id="logsSection">

                    <div class="stat-box">
                        <h3>மொத்த ஸ்கேன்கள்</h3>

                <div id="logsContent"></div>

                <div class="download-buttons">
                    <button class="btn-download btn-download-pdf" onclick="downloadPDF()">PDF ஐ பதிவிறக்கவும்</button>
                    <button class="btn-download btn-download-excel" onclick="downloadExcel()">Excel ஐ பதிவிறக்கவும்</button>

            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Deccaanow Corp</p>
            <p>Created by Deccaanow Technologies</p>
        </div>
    </div>

    <!-- Count Input Modal -->
    <div class="modal" id="countModal">
        <div class="modal-content">
            <h2>மக்களின் எண்ணிக்கை உள்ளிடவும்</h2>
            <input type="number" id="countInput" min="1" placeholder="எண்ணிக்கை" autofocus>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-submit" onclick="submitCount()">சமர்ப்பிக்கவும்</button>
                <button class="modal-btn modal-btn-cancel" onclick="cancelCount()">ரத்து செய்யவும்</button>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div class="password-modal" id="passwordModal">
        <div class="password-modal-content">
            <h2>கடவுச்சொல் உள்ளிடவும்</h2>
            <p>தகவல்களை பார்க்க கடவுச்சொல்லை உள்ளிடவும்</p>
            <input type="password" id="passwordInput" placeholder="கடவுச்சொல்">
            <div class="password-modal-buttons">
                <button class="password-modal-btn password-modal-btn-submit" onclick="verifyPassword()">உள்ளிடவும்</button>
                <button class="password-modal-btn password-modal-btn-cancel" onclick="closePasswordModal()">ரத்து செய்யவும்</button>
            </div>
        </div>
    </div>

    <!-- Success Checkmark -->
    <div class="success-checkmark" id="successCheckmark">
        <div class="success-circle">
            <div class="success-checkmark-check">✓</div>
        </div>
    </div>

    <script>
        let video = null;
        let canvas = null;
        let canvasContext = null;
        let stream = null;
        let scanning = false;
        let lastScannedBarcode = null;
        let lastScanTime = 0;
        let detectedBarcode = null;
        const SCAN_COOLDOWN = 1500; // 1.5s between duplicate scans
        const CORRECT_PASSWORD = '08032026';

        // Initialize
        window.addEventListener('load', () => {
            updateDateTime();
            setInterval(updateDateTime, 60000);
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 5000);
        });

        // Update Date and Time
        function updateDateTime() {
            const now = new Date();
            const days = ['ஞாயிற்றுக்கிழமை', 'திங்கட்கிழமை', 'செவ்வாய்கிழமை', 'புதன்கிழமை', 'வியாழக்கிழமை', 'வெள்ளிக்கிழமை', 'சனிக்கிழமை'];
            const months = ['ஜனவரி', 'பிப்ரவரி', 'மார்ச்', 'ஏப்ரல்', 'மே', 'ஜூன்', 'ஜூலை', 'ஆகஸ்ட்', 'செப்டம்பர்', 'அக்டோபர்', 'நவம்பர்', 'டிசம்பர்'];
            
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const date = now.getDate();
            const year = now.getFullYear();
            
            document.getElementById('headerDate').innerHTML = `${dayName} ${date} ${monthName} ${year}`;
        }

        // Start Scanning
        async function startScanning() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('scannerSection').classList.remove('hidden');
            
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video = document.getElementById('video');
                canvas = document.getElementById('canvas');
                canvasContext = canvas.getContext('2d');
                
                video.srcObject = stream;
                
                // Wait for metadata to load
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        console.log('[v0] Camera stream started successfully');
                        startQRScanning();
                    }).catch(err => {
                        console.error('[v0] Play error:', err);
                    });
                };
                
                video.onerror = (err) => {
                    console.error('[v0] Video error:', err);
                };
            } catch (error) {
                console.error('[v0] Camera access error:', error);
                alert('கேமரா அணுக முடியவில்லை');
                stopScanning();
            }
        }

        // Start QR Scanning Loop
        function startQRScanning() {
            scanning = true;
            let frameCount = 0;

            const scanFrame = () => {
                if (!scanning || !video || !canvas) {
                    return;
                }
                
                try {
                    // Get actual video dimensions
                    const width = video.videoWidth;
                    const height = video.videoHeight;
                    
                    if (width > 0 && height > 0) {
                        canvas.width = width;
                        canvas.height = height;
                        
                        // Draw current video frame
                        canvasContext.drawImage(video, 0, 0, width, height);
                        const imageData = canvasContext.getImageData(0, 0, width, height);
                        
                        // Scan for QR code
                        const code = jsQR(imageData.data, width, height);
                        
                        if (code && code.data) {
                            const now = Date.now();
                            // Only process if it's a new barcode or cooldown has passed
                            if (lastScannedBarcode !== code.data || now - lastScanTime > SCAN_COOLDOWN) {
                                detectedBarcode = code.data;
                                lastScannedBarcode = code.data;
                                lastScanTime = now;
                                
                                // Show capture button
                                document.getElementById('captureButton').classList.add('show');
                                console.log('[v0] Barcode detected:', code.data);
                            }
                        } else {
                            // Hide capture button if no barcode
                            document.getElementById('captureButton').classList.remove('show');
                            detectedBarcode = null;
                        }
                    }
                } catch (error) {
                    console.error('[v0] Scanning error:', error);
                }
                
                requestAnimationFrame(scanFrame);
            };
            
            scanFrame();
        }

        // Capture Barcode
        function captureBarcode() {
            if (!detectedBarcode) {
                console.log('[v0] No barcode detected');
                return;
            }
            
            console.log('[v0] Barcode captured:', detectedBarcode);
            
            // Stop scanning during count input
            document.getElementById('countModal').classList.add('active');
            document.getElementById('countInput').value = '1';
            document.getElementById('countInput').focus();
            
            // Hide capture button
            document.getElementById('captureButton').classList.remove('show');
        }

        // Submit Count
        function submitCount() {
            const count = parseInt(document.getElementById('countInput').value) || 1;
            const now = new Date();
            
            // Format time in Tamil
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const time = `${hours}:${minutes}:${seconds}`;
            
            // Save to localStorage
            let logs = JSON.parse(localStorage.getItem('scanLogs')) || [];
            logs.push({
                count: count,
                time: time,
                timestamp: now.getTime()
            });
            localStorage.setItem('scanLogs', JSON.stringify(logs));
            
            console.log('[v0] Data saved - Count:', count, 'Time:', time);
            
            // Show success
            showSuccessCheckmark();
            
            // Close modal and return to scanning
            document.getElementById('countModal').classList.remove('active');
            detectedBarcode = null;
            lastScannedBarcode = null;
        }

        // Cancel Count
        function cancelCount() {
            document.getElementById('countModal').classList.remove('active');
            detectedBarcode = null;
        }

        // Stop Scanning
        function stopScanning() {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => {
                    console.log('[v0] Stopping track:', track.kind);
                    track.stop();
                });
                stream = null;
            }
            document.getElementById('scannerSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            detectedBarcode = null;
            document.getElementById('captureButton').classList.remove('show');
        }

        // Show Success Checkmark
        function showSuccessCheckmark() {
            const checkmark = document.getElementById('successCheckmark');
            checkmark.classList.add('show');
            setTimeout(() => {
                checkmark.classList.remove('show');
            }, 1500);
        }

        // Show Password Modal
        function showPasswordModal() {
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        // Verify Password
        function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            
            if (password === CORRECT_PASSWORD) {
                console.log('[v0] Password verified');
                document.getElementById('passwordModal').classList.remove('active');
                showLogs();
            } else {
                console.log('[v0] Wrong password entered');
                alert('தவறான கடவுச்சொல்');
                document.getElementById('passwordInput').value = '';
            }
        }

        // Close Password Modal
        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
        }

        // Show Logs
        function showLogs() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('logsSection').classList.remove('hidden');
            
            const logs = JSON.parse(localStorage.getItem('scanLogs')) || [];
            const logsContent = document.getElementById('logsContent');
            
            let totalCount = 0;
            let html = '<table class="logs-table"><thead><tr><th>மக்கள்</th><th>நேரம்</th></tr></thead><tbody>';
            
            logs.forEach(log => {
                html += `<tr><td>${log.count}</td><td>${log.time}</td></tr>`;
                totalCount += log.count;
            });
            
            if (logs.length === 0) {
                html += '<tr><td colspan="2" class="no-data">குறிப்பு இல்லை</td></tr>';
            }
            
            html += '</tbody></table>';
            logsContent.innerHTML = html;
            
            document.getElementById('totalScans').textContent = logs.length;
            document.getElementById('totalPeople').textContent = totalCount;
        }

        // Show Dashboard
        function showDashboard() {
            document.getElementById('logsSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        // Download PDF
        function downloadPDF() {
            const logs = JSON.parse(localStorage.getItem('scanLogs')) || [];
            if (logs.length === 0) {
                alert('குறிப்பு தகவல் இல்லை');
                return;
            }

            const now = new Date();
            let html = `
                <h2 style="text-align: center;">சமயபுரம் மரியம்மன் பூச்சோரிதல் - திருவிழா 2026</h2>
                <p style="text-align: center;"><strong>தேதி:</strong> ${now.toLocaleDateString('ta-IN')}</p>
                <p style="text-align: center;"><strong>நேரம்:</strong> ${now.toLocaleTimeString('ta-IN')}</p>
                <table border="1" cellpadding="10" style="width: 100%; border-collapse: collapse;">
                <thead style="background: #8B0000; color: white;">
                <tr><th>மக்கள்</th><th>நேரம்</th></tr>
                </thead>
                <tbody>
            `;

            let totalCount = 0;
            logs.forEach(log => {
                html += `<tr><td>${log.count}</td><td>${log.time}</td></tr>`;
                totalCount += log.count;
            });

            html += `</tbody></table><p><strong>மொத்த மக்கள்:</strong> ${totalCount}</p>
                <p style="font-size: 12px; color: #999;">© 2026 Deccaanow Corp | Created by V0</p>
            `;

            const element = document.createElement('div');
            element.innerHTML = html;
            
            const opt = {
                margin: 10,
                filename: 'Scan_Report_' + now.getTime() + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            
            html2pdf().set(opt).from(element).save();
        }

        // Download Excel
        function downloadExcel() {
            const logs = JSON.parse(localStorage.getItem('scanLogs')) || [];
            if (logs.length === 0) {
                alert('குறிப்பு தகவல் இல்லை');
                return;
            }

            const data = logs.map((log, index) => ({
                'மக்கள்': log.count,
                'நேரம்': log.time
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Scan Report');
            XLSX.writeFile(wb, 'Scan_Report_' + new Date().getTime() + '.xlsx');
        }

        // Enter key handlers
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('passwordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyPassword();
            });
            document.getElementById('countInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitCount();
            });
        });
    </script>
</body>
</html>
